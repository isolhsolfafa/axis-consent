<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제출 완료 — AXIS 시스템 사용 동의서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --c: #2A2D35;
    --st: #8B90A0;
    --a: #6366F1;
    --a-light: #EEF2FF;
    --bg: #FAFAFA;
    --white: #FFFFFF;
    --g100: #F5F5F7;
    --g200: #E5E7EB;
    --g400: #9CA3AF;
    --g500: #6B7280;
    --green: #059669;
    --green-bg: #ECFDF5;
  }

  body {
    font-family: 'DM Sans', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--c);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    max-width: 480px;
    width: 100%;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--g200);
    border-radius: 12px;
    padding: 48px 32px;
    text-align: center;
  }

  .icon-wrap {
    width: 72px;
    height: 72px;
    background: var(--green-bg);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .icon-wrap svg {
    width: 36px;
    height: 36px;
    stroke: var(--green);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--green);
    background: var(--green-bg);
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 0.4px;
    font-weight: 600;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 10px;
    color: var(--c);
  }

  .lead {
    font-size: 14px;
    color: var(--st);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .info-block {
    background: var(--g100);
    border-radius: 8px;
    padding: 18px 20px;
    text-align: left;
    margin-bottom: 24px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--g200);
  }
  .info-row:last-child { border-bottom: 0; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }

  .info-row .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--g400);
    letter-spacing: 0.3px;
  }
  .info-row .value {
    color: var(--c);
    font-weight: 500;
  }

  .footer-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--g400);
    letter-spacing: 0.3px;
    line-height: 1.6;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <div class="tag">SUBMITTED · 제출 완료</div>

    <h1>동의서 제출 완료</h1>
    <p class="lead">동의서가 정상 접수되었습니다.</p>

    <div class="info-block">
      <div class="info-row">
        <span class="label">STATUS</span>
        <span class="value" style="color: var(--green);">✓ 정상 접수</span>
      </div>
      <div class="info-row">
        <span class="label">RECEIPT</span>
        <span class="value"><span id="receipt-time">—</span></span>
      </div>
      <div class="info-row">
        <span class="label">CONTACT</span>
        <span class="value">GST AX본부 DX팀</span>
      </div>
    </div>

    <p class="footer-note">
      GST · AX본부 DX팀<br>
      AXIS 시스템 사용 동의서 v1.0.0
    </p>

  </div>
</div>

<script>
  // 제출 시각 표시
  const now = new Date();
  const fmt = now.toLocaleString('ko-KR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
  document.getElementById('receipt-time').textContent = fmt;
</script>

</body>
</html>
